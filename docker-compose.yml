version: '3.8'

services:
  engine:
    build: .
    # Tell it to look in api/main.py
    command: python -m uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
    volumes:
      - .:/app

  dashboard:
    build: .
    # Use 'python -m streamlit' instead of just 'streamlit'
    command: python -m streamlit run ui.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://engine:8000
    depends_on:
      - engine